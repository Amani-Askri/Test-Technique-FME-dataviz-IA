name: Tableau CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'Tableau-CICD/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Tabcmd
        run: pip install tabcmd

      - name: Publish Tableau Workbook
        shell: pwsh
        run: |
          cd Tableau-CICD
          .\publish_tableau.ps1
        env:
          TABLEAU_SERVER: ${{ secrets.TABLEAU_SERVER }}
          TABLEAU_SITE: ${{ secrets.TABLEAU_SITE }}
          TABLEAU_USER: ${{ secrets.TABLEAU_USER }}
          TABLEAU_PASSWORD: ${{ secrets.TABLEAU_PASSWORD }}

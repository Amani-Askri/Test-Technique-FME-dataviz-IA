name: Tableau CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet de lancer le workflow manuellement pour tester

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      # 1. Checkout du repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Installer Python et Tabcmd (indispensable pour exécuter les commandes tabcmd)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Tabcmd
        run: pip install tabcmd

      # 3. Exécuter le script de publication
      - name: Publish Tableau Workbook
        shell: pwsh
        run: |
          # On s'assure que le script a accès aux secrets via des variables d'environnement
          .\publish_tableau.ps1
        env:
          TABLEAU_SERVER: ${{ secrets.TABLEAU_SERVER }}
          TABLEAU_SITE: ${{ secrets.TABLEAU_SITE }}
          TABLEAU_USER: ${{ secrets.TABLEAU_USER }}
          TABLEAU_PASSWORD: ${{ secrets.TABLEAU_PASSWORD }}

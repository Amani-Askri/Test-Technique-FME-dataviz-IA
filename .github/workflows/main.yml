name: Tableau CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet de lancer le déploiement manuellement pour tester

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      # 1. Récupération du code depuis le dépôt
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Installation de Python et Tabcmd
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Tabcmd
        run: pip install tabcmd

      # 3. Exécution du script de publication
      - name: Publish Tableau Workbook
        shell: pwsh
        run: |
          # On entre dans le dossier où se trouve le script
          cd Tableau-CICD
          .\publish_tableau.ps1
        env:
          TABLEAU_SERVER: ${{ secrets.TABLEAU_SERVER }}
          TABLEAU_SITE: ${{ secrets.TABLEAU_SITE }}
          TABLEAU_USER: ${{ secrets.TABLEAU_USER }}
          TABLEAU_PASSWORD: ${{ secrets.TABLEAU_PASSWORD }}
